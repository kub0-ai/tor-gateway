name: Build and Push

on:
  push:
    branches: [main]
    paths: ['docker/**', 'VERSION']

jobs:
  build:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kub0-ai/tor-gateway:${{ steps.version.outputs.version }}
            ghcr.io/kub0-ai/tor-gateway:latest
          cache-from: type=registry,ref=ghcr.io/kub0-ai/tor-gateway:buildcache
          cache-to: type=registry,ref=ghcr.io/kub0-ai/tor-gateway:buildcache,mode=max
